<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:#E8930033}
html{scroll-behavior:smooth}
body{
  font-family:'Urbanist',system-ui,sans-serif;
  background:#FDFAF5;color:#1C1108;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
/* grain */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.018;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:150px;
}
:root{
  --bg:#FDFAF5;--bg2:#F5EFE6;--bg3:#EAE2D6;
  --fg:#1C1108;--fg2:#4A3E30;--fg3:#7D7062;--fg4:#ADA196;
  --brown:#2A1A0A;--amber:#E89300;--gold:#D4A24E;--copper:#C47A3A;
  --green:#5D7E3A;--red:#C45050;--purple:#8878A0;
  --card:#FFFDF9;--border:#EDE5D8;
  --serif:'Sora',system-ui,sans-serif;
  --sans:'Urbanist',system-ui,sans-serif;
  --r:14px;--r2:20px;--r3:28px;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes growW{from{width:0}}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shimmer{0%{left:-100%}100%{left:100%}}

.a{animation:fadeUp .55s cubic-bezier(.16,1,.3,1) both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}

.nobar::-webkit-scrollbar{display:none}.nobar{scrollbar-width:none}
button{font-family:var(--sans);cursor:pointer}

.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r2);
  transition:all .28s cubic-bezier(.16,1,.3,1);
}
.card:hover{border-color:#DDD5C8;box-shadow:0 8px 28px rgba(28,17,8,.06);transform:translateY(-2px)}

.btn-main{
  padding:14px 34px;border-radius:100px;border:none;
  background:var(--amber);color:#fff;
  font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  transition:all .25s cubic-bezier(.16,1,.3,1);
  box-shadow:0 4px 16px rgba(232,147,0,.25);
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--sans);cursor:pointer;
}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,147,0,.3)}
.btn-main:active{transform:scale(.97)}

.btn-dark{
  padding:14px 30px;border-radius:100px;border:none;
  background:var(--brown);color:var(--bg);
  font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  transition:all .25s cubic-bezier(.16,1,.3,1);
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--sans);cursor:pointer;
}
.btn-dark:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(42,26,10,.15)}

.pill{
  padding:9px 20px;border-radius:100px;border:1.5px solid var(--border);
  background:transparent;color:var(--fg3);font-size:12.5px;font-weight:600;
  transition:all .22s ease;white-space:nowrap;font-family:var(--sans);cursor:pointer;
  letter-spacing:.06em;text-transform:uppercase;
}
.pill.on{background:var(--brown);color:var(--bg);border-color:var(--brown)}

.badge{
  display:inline-flex;padding:3px 10px;border-radius:100px;
  font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
}
.badge-best{background:#E8930015;color:#C47A00}
.badge-seasonal{background:#E8930012;color:#D4820A}
.badge-popular{background:#D4A24E12;color:#A67C2A}
.badge-deal{background:#5D7E3A14;color:#5D7E3A}

.section-tag{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}

/* tab bar */
.tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(253,250,245,.92);backdrop-filter:blur(20px) saturate(1.5);
  border-top:1px solid var(--border);padding:6px 0 8px;
}
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .tabs{padding-bottom:calc(8px + env(safe-area-inset-bottom))!important}
}
.tabs-inner{display:flex;justify-content:space-around;max-width:440px;margin:0 auto}
.tab-btn{
  background:none;border:none;display:flex;flex-direction:column;
  align-items:center;gap:2px;padding:4px 18px;position:relative;
  transition:color .2s;
}
.tab-btn .tab-dot{
  position:absolute;top:-7px;width:20px;height:3px;
  border-radius:2px;background:var(--amber);display:none;
}
.tab-btn.active .tab-dot{display:block}
.tab-btn.active{color:var(--amber)}
.tab-btn:not(.active){color:var(--fg4)}
.tab-btn svg{transition:transform .2s}
.tab-btn.active svg{transform:scale(1.1)}
.tab-label{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase}
.tab-btn.active .tab-label{font-weight:600}
.cart-badge{
  position:absolute;top:-2px;right:10px;
  background:var(--amber);color:#fff;
  width:17px;height:17px;border-radius:50%;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  animation:pop .3s ease;
}

/* overlay */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(28,17,8,.45);backdrop-filter:blur(4px);
  animation:fadeIn .2s ease;
}
.sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--bg);border-radius:22px 22px 0 0;
  max-height:90vh;overflow-y:auto;
  animation:slideUp .32s cubic-bezier(.16,1,.3,1);
}

/* toast */
.toast{
  position:fixed;bottom:88px;left:50%;
  background:var(--brown);color:#fff;padding:12px 24px;
  border-radius:100px;font-size:14px;font-weight:500;
  box-shadow:0 8px 32px rgba(28,17,8,.22);
  z-index:8000;pointer-events:none;
  display:flex;align-items:center;gap:8px;white-space:nowrap;
  transition:all .3s cubic-bezier(.16,1,.3,1);
}

.page{display:none}
.page.active{display:block}

/* responsive hero cup */
.hero-cup{display:none}
@media(min-width:700px){.hero-cup{display:block!important}}

/* item card shimmer */
.card-top{position:relative;overflow:hidden;border-radius:var(--r2) var(--r2) 0 0}
.card-top::after{
  content:'';position:absolute;top:0;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
  animation:shimmer 3s ease infinite;left:-100%;
}

.item-desc{
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  min-height:36px;
}

/* customizer option */
.opt{
  padding:13px 6px;border-radius:12px;text-align:center;
  border:1.5px solid var(--border);background:transparent;
  transition:all .2s ease;cursor:pointer;font-family:var(--sans);
}
.opt.on{border-color:var(--brown);background:#2A1A0A08}

.addon-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 14px;border-radius:12px;border:1.5px solid var(--border);
  background:transparent;transition:all .2s ease;cursor:pointer;
  width:100%;font-family:var(--sans);
}
.addon-row.on{border-color:var(--brown);background:#2A1A0A06}

.chkbox{
  width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;transition:all .15s ease;
}
.chkbox.on{background:var(--brown);border:none}

.add-btn{
  width:34px;height:34px;border-radius:50%;border:none;
  background:var(--brown);color:#fff;
  display:flex;align-items:center;justify-content:center;
  transition:all .22s ease;cursor:pointer;
}
.add-btn.popped{background:var(--green);transform:scale(1.15)}

.qty-btn{
  width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);
  background:none;font-size:17px;color:var(--fg);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-family:var(--sans);
}

/* progress bar animation */
.progress-fill{animation:growW .8s ease-out}
</style>
</head>

function badgeHtml(text, type) {
  if(!text) return '';
  const cls = {
    "best seller":"badge-best","seasonal":"badge-seasonal",
    "popular":"badge-popular","best deal":"badge-deal"
  }[type] || "badge-popular";
  return `<span class="badge ${cls}">${text}</span>`;
}

function nxtReward(){ return RWDS.find(r=>r.pts>USER.pts); }

// ═══ TOAST ═══════════════════════════════════

let toastTimer;
function showToast(msg){
  const t = $('#toast');
  t.innerHTML = `<span style="color:var(--amber)">${icoChk}</span> ${msg}`;
  t.style.opacity = '1';
  t.style.transform = 'translate(-50%,0)';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{
    t.style.opacity='0'; t.style.transform='translate(-50%,10px)';
  }, 2200);
}

// ═══ CART ═════════════════════════════════════

function addToCart(item, customized){
  cart.push(customized || item);
  updateCartBadge();
  if(!customized) showToast(`${item.n} added`);
}

function removeFromCart(idx){
  cart.splice(idx,1);
  updateCartBadge();
  if(currentTab==='order') renderOrder();
}

function updateCartBadge(){
  const b = $('#tab-cart-badge');
  const h = $('#header-cart-badge');
  if(cart.length > 0){ 
    b.style.display='flex'; b.textContent=cart.length;
    if(h){ h.style.display='flex'; h.textContent=cart.length; }
  } else { 
    b.style.display='none';
    if(h){ h.style.display='none'; }
  }
}

function cartTotal(){ return cart.reduce((s,i)=>s+(i.tp||i.p),0); }

// ═══ TAB SWITCHING ═══════════════════════════

function switchTab(tab){
  currentTab = tab;
  $$('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===tab);
  });
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ═══ RENDER ══════════════════════════════════

function render(){
  const app = $('#app');
  switch(currentTab){
    case 'home': app.innerHTML = renderHome(); break;
    case 'order': app.innerHTML = renderOrder_html(); break;
    case 'rewards': app.innerHTML = renderRewards(); break;
    case 'profile': app.innerHTML = renderProfile(); break;
  }
}

// ═══ CUSTOMIZER ══════════════════════════════

function openCustomizer(id){
  const item = ITEMS.find(i=>i.id===id);
  if(!item||!item.cust) { quickAdd(id); return; }
  custState = { sz:"m", mk:"whole", ex:[], qt:1 };
  renderCustomizer(item);
}

function renderCustomizer(item){
  const sp = SIZES.find(s=>s.id===custState.sz)?.m||0;
  const mp = MILKS.find(m=>m.id===custState.mk)?.m||0;
  const ep = custState.ex.reduce((s,id)=>s+(EXTRAS.find(e=>e.id===id)?.p||0),0);
  const tot = (item.p+sp+mp+ep)*custState.qt;

  $('#overlay-root').innerHTML = `
  <div class="overlay" onclick="closeOverlay()">
    <div class="sheet" style="max-width:480px;margin:0 auto" onclick="event.stopPropagation()">
      <!-- Header -->
      <div style="padding:30px 24px 20px;text-align:center;position:relative;background:linear-gradient(145deg,${item.c}0e,${item.c}05)">
        <button onclick="closeOverlay()" style="position:absolute;top:14px;right:14px;background:var(--card);border:1px solid var(--border);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--fg3);cursor:pointer">${icoX}</button>
        ${cupSvg(item.c, 56)}
        <h2 style="font-family:var(--serif);font-size:20px;font-weight:700;margin-top:10px;letter-spacing:.04em;text-transform:uppercase">${item.n}</h2>
        <p style="font-size:12.5px;color:var(--fg3);margin-top:4px">${item.d}</p>
      </div>

      <div style="padding:20px 24px 130px">
        <!-- Size -->
        <p style="font-size:12px;font-weight:600;color:var(--fg);margin-bottom:10px;letter-spacing:.03em">Size</p>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px">
          ${SIZES.map(s=>`
            <button class="opt${custState.sz===s.id?' on':''}" onclick="custState.sz='${s.id}';renderCustomizer(ITEMS.find(i=>i.id===${item.id}))">
              <div style="font-size:14px;font-weight:600;color:var(--fg)">${s.l}</div>
              <div style="font-size:11px;color:var(--fg4);margin-top:1px">${s.s}</div>
              ${s.m>0?`<div style="font-size:11px;color:var(--amber);margin-top:3px;font-weight:500">+${fmt(s.m)}</div>`:''}
            </button>
          `).join('')}
        </div>

        <!-- Milk -->
        <p style="font-size:12px;font-weight:600;color:var(--fg);margin-bottom:10px;letter-spacing:.03em">Milk</p>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px">
          ${MILKS.map(m=>`
            <button class="pill${custState.mk===m.id?' on':''}" onclick="custState.mk='${m.id}';renderCustomizer(ITEMS.find(i=>i.id===${item.id}))" style="padding:9px 8px;font-size:13px;text-align:center">${m.l}</button>
          `).join('')}
        </div>

        <!-- Add-ons -->
        <p style="font-size:12px;font-weight:600;color:var(--fg);margin-bottom:10px;letter-spacing:.03em">Add-ons</p>
        <div style="display:grid;gap:6px;margin-bottom:24px">
          ${EXTRAS.map(e=>{
            const on=custState.ex.includes(e.id);
            return `
            <button class="addon-row${on?' on':''}" onclick="toggleExtra('${e.id}',${item.id})">
              <span style="font-size:13.5px;font-weight:500">${e.l}</span>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:12.5px;font-weight:500;color:${e.p?'var(--amber)':'var(--green)'}">${e.p?'+'+fmt(e.p):'free'}</span>
                <div class="chkbox${on?' on':''}">${on?icoChk:''}</div>
              </div>
            </button>`;
          }).join('')}
        </div>

        <!-- Quantity -->
        <p style="font-size:12px;font-weight:600;color:var(--fg);margin-bottom:10px;letter-spacing:.03em">Quantity</p>
        <div style="display:flex;align-items:center;gap:18px">
          <button class="qty-btn" onclick="custState.qt=Math.max(1,custState.qt-1);renderCustomizer(ITEMS.find(i=>i.id===${item.id}))">−</button>
          <span style="font-size:20px;font-weight:600;min-width:24px;text-align:center">${custState.qt}</span>
          <button class="qty-btn" onclick="custState.qt++;renderCustomizer(ITEMS.find(i=>i.id===${item.id}))">+</button>
        </div>
      </div>

      <!-- Sticky CTA -->
      <div style="position:sticky;bottom:0;padding:14px 24px 28px;background:linear-gradient(to top,var(--bg),var(--bg),transparent)">
        <button class="btn-main" onclick="addCustomized(${item.id},${tot})" style="width:100%;justify-content:center;font-size:15.5px;padding:15px 34px">
          Add to order — ${fmt(tot)}
        </button>
      </div>
    </div>
  </div>`;
}

function toggleExtra(id, itemId){
  if(custState.ex.includes(id)) custState.ex = custState.ex.filter(x=>x!==id);
  else custState.ex.push(id);
  renderCustomizer(ITEMS.find(i=>i.id===itemId));
}

function addCustomized(id, total){
  const item = ITEMS.find(i=>i.id===id);
  addToCart(item, {...item, sz:custState.sz, mk:custState.mk, ex:[...custState.ex], qt:custState.qt, tp:total});
  showToast(`${item.n} added`);
  closeOverlay();
  if(currentTab==='order') renderOrder();
}
